site_name: pynetworkin
site_description: "Kinase–substrate network prediction: PostgreSQL, Numba, pynetphorest, live data, false-negative recovery"
site_author: Abhinav Mishra
site_url: https://bibymaths.github.io/pynetworkin
repo_url: https://github.com/bibymaths/pynetworkin
repo_name: bibymaths/pynetworkin
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Ubuntu           # The font for standard paragraph text
    code: Fira Code        # The font for code blocks
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo # Change this to your brand color!
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: numpy
            show_source: true
            show_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Guides:
      - Installation: guides/installation.md
      - Data Sources: guides/data_sources.md
      - False Negative Recovery: guides/recovery.md
  - API Reference:
      - CLI: reference/cli.md
      - Motif Scoring: api/motif_scoring.md
      - Graph Scoring: api/graph_scoring.md
      - Recovery: api/recovery.md
      - Output: api/output.md

copyright: >
  Copyright &copy; 2026 <a href="https://bibymaths.github.io">Abhinav Mishra</a>.